<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katalog Koleksi Seni</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f5f5f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      header {
        background: #1a1a2e;
        color: white;
        padding: 20px 40px;
      }
      header h1 {
        font-size: 1.8rem;
      }
      header p {
        font-size: 0.9rem;
        color: #aaa;
        margin-top: 4px;
      }
      main {
        flex: 1;
        padding: 30px 40px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }
      h2 {
        margin-bottom: 20px;
        font-size: 1.3rem;
        color: #444;
      }

      /* Katalog Grid */
      #katalog {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      .card {
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }
      .card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        background: #ddd;
      }
      .card .card-title {
        padding: 10px 12px;
        font-size: 0.9rem;
        font-weight: 600;
      }

      /* Detail Panel */
      #detail-panel {
        display: none;
        background: white;
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 30px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        border-left: 4px solid #4f8ef7;
      }
      #detail-panel.active {
        display: block;
      }
      #detail-panel h3 {
        font-size: 1.2rem;
        margin-bottom: 14px;
        color: #1a1a2e;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 16px;
      }
      .detail-item label {
        font-size: 0.75rem;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .detail-item p {
        font-size: 1rem;
        font-weight: 600;
        margin-top: 2px;
      }
      #detail-image {
        width: 100%;
        max-height: 300px;
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 16px;
        background: #f0f0f0;
      }
      #close-detail {
        margin-top: 12px;
        background: none;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 0.85rem;
      }
      #close-detail:hover {
        background: #f0f0f0;
      }

      /* Loading & error */
      #loading {
        text-align: center;
        padding: 40px;
        color: #888;
      }
      #error-msg {
        color: red;
        padding: 20px;
      }

      /* Footer fortune */
      footer {
        background: #1a1a2e;
        color: #ccc;
        padding: 20px 40px;
        font-size: 0.9rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }
      .fortune-box {
        background: rgba(255, 255, 255, 0.07);
        border-radius: 8px;
        padding: 10px 16px;
      }
      .fortune-box .label {
        font-size: 0.72rem;
        color: #888;
        margin-bottom: 4px;
      }
      .fortune-box .text {
        font-style: italic;
      }
      .fortune-source {
        font-size: 0.7rem;
        color: #666;
        margin-top: 3px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🎨 Katalog Koleksi Seni</h1>
      <p>Foto &amp; video pilihan dari berbagai seniman</p>
    </header>

    <main>
      <!-- Detail Panel -->
      <div id="detail-panel">
        <img id="detail-image" src="" alt="Detail" />
        <h3 id="detail-judul">—</h3>
        <div class="detail-grid">
          <div class="detail-item">
            <label>Pencipta</label>
            <p id="detail-pencipta">—</p>
          </div>
          <div class="detail-item">
            <label>Tahun</label>
            <p id="detail-tahun">—</p>
          </div>
          <div class="detail-item">
            <label>Harga</label>
            <p id="detail-harga">—</p>
          </div>
        </div>
        <button id="close-detail" onclick="closeDetail()">✕ Tutup</button>
      </div>

      <h2>📁 Daftar Koleksi</h2>
      <div id="loading">Memuat koleksi...</div>
      <div id="error-msg"></div>
      <div id="katalog"></div>
    </main>

    <footer>
      <div>© 2025 Katalog Koleksi Seni — Hands On Caching Lab</div>
      <div id="fortune-serverless" class="fortune-box">
        <div class="label">Fortune (Serverless)</div>
        <div class="text" id="fortune-serverless-text">Memuat...</div>
        <div class="fortune-source" id="fortune-serverless-source"></div>
      </div>
      <div id="fortune-edge" class="fortune-box">
        <div class="label">Fortune (Edge)</div>
        <div class="text" id="fortune-edge-text">Memuat...</div>
        <div class="fortune-source" id="fortune-edge-source"></div>
      </div>
    </footer>

    <script>
      // ── Load katalog ──────────────────────────────────────────
      async function loadKatalog() {
        try {
          const res = await fetch("/api/get-koleksi");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          document.getElementById("loading").style.display = "none";

          const grid = document.getElementById("katalog");
          if (!data.length) {
            grid.innerHTML = "<p>Belum ada koleksi.</p>";
            return;
          }
          data.forEach((item) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
          <img src="${item.path}" alt="${item.judul}" loading="lazy"
               onerror="this.src='https://placehold.co/400x300?text=Foto'">
          <div class="card-title">${item.judul}</div>
        `;
            card.addEventListener("click", () => loadDetail(item.id));
            grid.appendChild(card);
          });
        } catch (e) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error-msg").textContent =
            "Gagal memuat koleksi: " + e.message;
        }
      }

      // ── Load detail ───────────────────────────────────────────
      async function loadDetail(id) {
        try {
          const res = await fetch(`/api/get-detail?id=${id}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const item = await res.json();

          document.getElementById("detail-judul").textContent = item.judul;
          document.getElementById("detail-pencipta").textContent =
            item.pencipta;
          document.getElementById("detail-tahun").textContent = item.tahun
            ? new Date(item.tahun).getFullYear()
            : "—";
          document.getElementById("detail-harga").textContent = item.harga
            ? "Rp " + Number(item.harga).toLocaleString("id-ID")
            : "—";
          document.getElementById("detail-image").src = item.path || "";

          const panel = document.getElementById("detail-panel");
          panel.classList.add("active");
          panel.scrollIntoView({ behavior: "smooth" });
        } catch (e) {
          alert("Gagal memuat detail: " + e.message);
        }
      }

      function closeDetail() {
        document.getElementById("detail-panel").classList.remove("active");
      }

      // ── Load fortune ──────────────────────────────────────────
      async function loadFortune() {
        try {
          const [r1, r2] = await Promise.all([
            fetch("/api/fortune"),
            fetch("/api/fortune-edge"),
          ]);
          const d1 = await r1.json();
          const d2 = await r2.json();

          document.getElementById("fortune-serverless-text").textContent =
            d1.fortune;
          document.getElementById("fortune-serverless-source").textContent =
            d1.source;
          document.getElementById("fortune-edge-text").textContent = d2.fortune;
          document.getElementById("fortune-edge-source").textContent =
            d2.source +
            (d2.timestamp
              ? " · " + new Date(d2.timestamp).toLocaleTimeString("id-ID")
              : "");
        } catch (e) {
          console.error("Fortune error:", e);
        }
      }

      loadKatalog();
      loadFortune();
    </script>
  </body>
</html>
